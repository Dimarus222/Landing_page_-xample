<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#0a0e14">
    <meta name="description" content="SecOpticon — Полный теоретический корпус 10.05.01 Компьютерная безопасность. 27+ уроков, курс пополняется.">
    <title>SecOpticon | 300+ уроков КБ</title>
    
    <!-- Open Graph -->
    <meta property="og:title" content="SecOpticon — Теоретический корпус КБ">
    <meta property="og:description" content="Бесплатный учебник по компьютерной безопасности. Математика, C/ASM, сети, криптография — с контекстом ИБ и источниками.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ru_RU">
    
    <!-- Стили -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Font Awesome 6.5.0 -->
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- highlight.js 11.9.0 -->
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- PWA-манифест -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>

<!-- ==================== МОБИЛЬНЫЙ ТОПБАР ==================== -->
<div id="mobile-topbar">
    <span class="logo"><i class="fas fa-shield-haltered"></i> SecOpticon</span>
    
    <span id="offline-indicator" title="Оффлайн-режим" style="display:none;">📡</span>
    
    <button id="theme-toggle-mobile" onclick="toggleTheme()" aria-label="Переключить тему оформления" title="Сменить тему (тёмная/светлая/сепия)">
        <i class="fas fa-palette"></i>
        <span class="btn-label">Тема</span>
    </button>
    
    <button id="menu-toggle" onclick="toggleMobileSidebar()" aria-label="Открыть меню навигации" title="Меню уроков">
        <i class="fas fa-bars"></i>
        <span class="btn-label">Меню</span>
    </button>
</div>

<!-- ==================== ОВЕРЛЕЙ ==================== -->
<div id="sidebar-overlay" onclick="closeMobileSidebar()" role="presentation" aria-hidden="true"></div>

<!-- ==================== САЙДБАР ==================== -->
<aside id="sidebar" role="navigation" aria-label="Оглавление курса">
    <div id="sidebar-header">
        <h2><i class="fas fa-shield-haltered"></i> SecOpticon</h2>
        
        <!-- Случайный урок -->
        <button onclick="openRandomLesson()" 
                style="width:100%; padding:8px; margin:6px 0; background:var(--surface2); border:1px solid var(--border); color:var(--accent-cyan); border-radius:6px; cursor:pointer; font-size:0.85rem;"
                aria-label="Открыть случайный урок">
            <i class="fas fa-random"></i> Случайный урок
        </button>
        
        <!-- Поиск -->
        <input type="text" id="search-box" placeholder="Поиск по урокам..." oninput="filterLessons()" aria-label="Поиск по названию и содержимому уроков">
        
        <!-- Прогресс -->
        <div class="progress-mini">
            <div class="progress-mini-fill" id="global-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Общий прогресс курса"></div>
        </div>
        <small id="lesson-counter">Загружено уроков: 0</small>
        
        <!-- Кнопки управления -->
        <div style="display:flex; gap:4px; margin-top:8px;">
            <button onclick="toggleTheme()" title="Сменить тему (тёмная/светлая/сепия)" aria-label="Сменить тему оформления"
                    style="flex:1; padding:7px 4px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; cursor:pointer; font-size:0.75rem;">
                <i class="fas fa-palette"></i> Тема
            </button>
            <button onclick="exportProgress()" title="Скачать прогресс, заметки и избранное" aria-label="Скачать резервную копию"
                    style="flex:1; padding:7px 4px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; cursor:pointer; font-size:0.75rem;">
                <i class="fas fa-download"></i> Резерв
            </button>
            <button onclick="document.getElementById('import-progress-input').click()" title="Загрузить прогресс из файла" aria-label="Загрузить резервную копию"
                    style="flex:1; padding:7px 4px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; cursor:pointer; font-size:0.75rem;">
                <i class="fas fa-upload"></i> Загрузить
            </button>
            <input type="file" id="import-progress-input" accept=".json" onchange="importProgress(this)" style="display:none;" aria-label="Выберите файл резервной копии">
        </div>
    </div>
    
    <!-- Дерево уроков -->
    <div id="tree-container"></div>
</aside>

<!-- ==================== КОНТЕНТ ==================== -->
<main id="content" role="main" aria-label="Содержание урока">
    <div id="lesson-render">
        <div id="welcome-screen">
            <i class="fas fa-shield-haltered"></i>
            <h2>Полный Теоретический Корпус</h2>
            <p style="color:var(--text-secondary);">Специалитет 10.05.01 «Компьютерная безопасность»</p>
            <p>27+ уроков, курс пополняется. Выберите урок в боковом меню или используйте поиск.</p>
            <p style="color:var(--accent-law);"><i class="fas fa-gavel"></i> Все материалы — для локального изучения.</p>
        </div>
    </div>
</main>

<!-- ==================== ДАННЫЕ СЕМЕСТРОВ ==================== -->
<script src="js/data/s1-math.js"></script>
<script src="js/data/s2-cs.js"></script>
<script src="js/data/s3-os-net.js"></script>
<script src="js/data/s4-crypto.js"></script>
<script src="js/data/s5-websec.js"></script>

<!-- ==================== ЯДРО ПРИЛОЖЕНИЯ ==================== -->
<script src="js/app.js"></script>

<!-- ==================== SERVICE WORKER ==================== -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(function(reg) { console.log('✅ SW зарегистрирован'); })
      .catch(function(err) { console.log('❌ SW ошибка:', err); });
  }
</script>

</body>
</html>
