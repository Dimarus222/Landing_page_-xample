<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#0a0e14">
    <meta name="description" content="SecOpticon — Полный теоретический корпус 10.05.01 Компьютерная безопасность">
    <title>SecOpticon | 300+ уроков КБ</title>
    
    <!-- Стили -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">

    <!-- Подсветка синтаксиса -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<!-- Верхняя панель (мобильная) -->
<div id="mobile-topbar">
    <span class="logo"><i class="fas fa-book-dead"></i> SecOpticon</span>
    <button id="menu-toggle" onclick="toggleMobileSidebar()" aria-label="Меню">
        <i class="fas fa-bars"></i>
    </button>
</div>

<!-- Оверлей для мобильного меню -->
<div id="sidebar-overlay" onclick="closeMobileSidebar()"></div>

<!-- Боковая панель -->
<aside id="sidebar">
    <div id="sidebar-header">
        <h2><i class="fas fa-book-dead"></i> SecOpticon</h2>
        <input type="text" id="search-box" placeholder="Поиск по урокам..." oninput="filterLessons()" aria-label="Поиск">
        <div class="progress-mini">
            <div class="progress-mini-fill" id="global-progress"></div>
        </div>
        <small id="lesson-counter">Загружено уроков: 0</small>
    </div>
    <div id="tree-container"></div>
</aside>

<!-- Основной контент -->
<main id="content">
    <div id="lesson-render">
        <div id="welcome-screen">
            <i class="fas fa-shield-haltered"></i>
            <h2>Полный Теоретический Корпус</h2>
            <p style="color:var(--text-secondary);">Специалитет 10.05.01 «Компьютерная безопасность»</p>
            <p>Выберите урок в боковом меню или используйте поиск.</p>
            <p style="color:var(--accent-law);"><i class="fas fa-gavel"></i> Все материалы — для локального изучения.</p>
        </div>
    </div>
</main>

<!-- Данные семестров -->
<script src="js/data/s1-math.js"></script>
<script src="js/data/s2-cs.js"></script>
<script src="js/data/s3-os-net.js"></script>
<script src="js/data/s4-crypto.js"></script>
<script src="js/data/s5-websec.js"></script>

<!-- Сборщик базы -->
<script src="js/data-loader.js"></script>

<!-- Ядро приложения -->
<script src="js/app.js"></script>

</body>
</html>
