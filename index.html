<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#0a0e14">
    <meta name="description" content="SecOpticon — Полный теоретический корпус 10.05.01 Компьютерная безопасность. 27+ уроков, курс пополняется.">
    <title>SecOpticon | 300+ уроков КБ</title>
    
    <!-- Open Graph -->
    <meta property="og:title" content="SecOpticon — Теоретический корпус КБ">
    <meta property="og:description" content="Бесплатный учебник по компьютерной безопасности. Математика, C/ASM, сети, криптография — с контекстом ИБ и источниками.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ru_RU">
    
    <!-- Стили -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Font Awesome 6.5.0 с SRI -->
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" 
          integrity="sha512-vbXP0lLHl8dmrXdZLrDMEyHWeKsFMCLVJRmFZ5nNrdX/hkQeGmNv0BtGQHlF6Y5DxYU3GzGzBjQZ4q4+VmUoJg==" 
          crossorigin="anonymous"
          referrerpolicy="no-referrer">
    
    <!-- highlight.js 11.9.0 с SRI -->
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
          integrity="sha512-G9FjL0G+MqLPl8mzGFc0GqY5LPhbP7D7dHV+mI0l7dPtXqVch9pFJxRgJvQiw0qXbTlSGQeFfYkzNGjYMnYUQ=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
            integrity="sha512-1jLk8u4KvFbGxMEjZ1bG1kMHqQStv4N7lH8BbGqKtGzRwGZmQXgXrPqYqHqYxPUNYgMGmGjXQFqrJtNGYpZQ=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"></script>
    
    <!-- PWA-манифест -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>

<div id="mobile-topbar">
    <span class="logo"><i class="fas fa-book-dead"></i> SecOpticon</span>
    <span id="offline-indicator" title="Оффлайн-режим" style="display:none; margin-right:8px; font-size:0.9rem;">📡</span>
    <button id="menu-toggle" onclick="toggleMobileSidebar()" aria-label="Открыть меню навигации">
        <i class="fas fa-bars"></i>
    </button>
    <button id="theme-toggle-mobile" onclick="toggleTheme()" aria-label="Переключить тему оформления">
        <i class="fas fa-palette"></i>
    </button>
</div>

<div id="sidebar-overlay" onclick="closeMobileSidebar()" role="presentation" aria-hidden="true"></div>

<aside id="sidebar" role="navigation" aria-label="Оглавление курса">
    <div id="sidebar-header">
        <h2><i class="fas fa-book-dead"></i> SecOpticon</h2>
        
        <!-- Кнопка случайного урока -->
        <button onclick="openRandomLesson()" 
                style="width:100%; padding:6px; margin:6px 0; background:var(--surface2); border:1px solid var(--border); color:var(--accent-cyan); border-radius:4px; cursor:pointer; font-size:0.8rem;"
                aria-label="Открыть случайный урок">
            <i class="fas fa-random"></i> Случайный урок
        </button>
        
        <input type="text" id="search-box" placeholder="Поиск по урокам..." oninput="filterLessons()" aria-label="Поиск по названию и содержимому уроков">
        
        <div class="progress-mini">
            <div class="progress-mini-fill" id="global-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Общий прогресс курса"></div>
        </div>
        <small id="lesson-counter">Пройдено: 0 из 0</small>
        
        <!-- Кнопки темы и экспорта/импорта -->
        <div style="display:flex; gap:4px; margin-top:8px;">
            <button onclick="toggleTheme()" title="Сменить тему (тёмная/светлая/сепия)" aria-label="Сменить тему оформления"
                    style="flex:1; padding:6px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; cursor:pointer; font-size:0.75rem;">
                <i class="fas fa-palette"></i> Тема
            </button>
            <button onclick="exportProgress()" title="Скачать прогресс" aria-label="Скачать прогресс и заметки"
                    style="flex:1; padding:6px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; cursor:pointer; font-size:0.75rem;">
                <i class="fas fa-download"></i>
            </button>
            <button onclick="document.getElementById('import-progress-input').click()" title="Загрузить прогресс" aria-label="Загрузить прогресс и заметки"
                    style="flex:1; padding:6px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; cursor:pointer; font-size:0.75rem;">
                <i class="fas fa-upload"></i>
            </button>
            <input type="file" id="import-progress-input" accept=".json" onchange="importProgress(this)" style="display:none;" aria-label="Выберите файл прогресса">
        </div>
    </div>
    <div id="tree-container"></div>
</aside>

<main id="content" role="main" aria-label="Содержание урока">
    <div id="lesson-render">
        <div id="welcome-screen">
            <i class="fas fa-shield-haltered"></i>
            <h2>Полный Теоретический Корпус</h2>
            <p style="color:var(--text-secondary);">Специалитет 10.05.01 «Компьютерная безопасность»</p>
            <p>27+ уроков, курс пополняется. Выберите урок в боковом меню или используйте поиск.</p>
            <p style="color:var(--accent-law);"><i class="fas fa-gavel"></i> Все материалы — для локального изучения.</p>
        </div>
    </div>
</main>

<!-- Данные семестров -->
<script src="js/data/s1-math.js"></script>
<script src="js/data/s2-cs.js"></script>
<script src="js/data/s3-os-net.js"></script>
<script src="js/data/s4-crypto.js"></script>
<script src="js/data/s5-websec.js"></script>

<!-- Ядро приложения -->
<script src="js/app.js"></script>

<!-- Регистрация Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.log('SW failed', err));
  }
</script>

</body>
</html>
