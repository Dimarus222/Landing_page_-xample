<div class="theory-block"><h3>Почему математический анализ — фундамент ИБ?</h3>
<p>Математический анализ — это язык современной криптографии и теории информации. Когда исследователь пишет «вероятность успешной атаки пренебрежимо мала», он формально утверждает: «для любого ε>0 существует размер параметра безопасности n, начиная с которого вероятность меньше ε». Это — прямое применение определения предела по Коши. Асимптотическая стойкость криптосистем, доказуемая безопасность (provable security), сходимость итеративных алгоритмов криптоанализа, анализ генераторов псевдослучайных чисел — всё это базируется на теории пределов.</p>
<p>Кроме того, атаки по сторонним каналам (Side-Channel Analysis) используют статистические методы: измеряя энергопотребление микросхемы тысячи раз, мы получаем выборку, среднее которой сходится к истинному значению. Это — закон больших чисел, доказываемый через пределы. Без понимания ε-δ языка невозможно формально рассуждать о стойкости систем защиты.</p></div>

<div class="lesson-card"><h3>Определение предела функции по Коши (строгое)</h3>
<p>Пусть функция <code>f(x)</code> определена в некоторой проколотой окрестности точки <code>x₀</code>. Число <code>A</code> называется <span class="definition">пределом</span> функции <code>f(x)</code> при <code>x</code>, стремящемся к <code>x₀</code>, если:</p>
<p style="text-align:center;font-size:1.15rem;margin:14px 0;"><code>∀ ε > 0 ∃ δ = δ(ε) > 0 : 0 < |x − x₀| < δ ⇒ |f(x) − A| < ε</code></p>
<p><b>Расшифровка обозначений:</b></p><ul>
<li><code>∀ ε > 0</code> — «для любого сколь угодно малого эпсилон». Эпсилон задаёт требуемую точность приближения.</li>
<li><code>∃ δ > 0</code> — «существует дельта, зависящая от выбранного эпсилон». Дельта определяет окрестность точки x₀.</li>
<li><code>0 < |x − x₀| < δ</code> — аргумент x находится в δ-окрестности точки x₀, но не равен ей (проколотая окрестность).</li>
<li><code>|f(x) − A| < ε</code> — значение функции отличается от предела менее чем на ε.</li></ul>
<p><b>Ключевой момент:</b> порядок кванторов. Сначала фиксируется ε, потом под него подбирается δ. Если бы порядок был обратным, определение описывало бы ограниченную функцию, а не предел.</p></div>

<div class="lesson-card"><h3>Геометрическая интерпретация</h3>
<p>На координатной плоскости определение означает: какой бы узкий горизонтальный коридор шириной 2ε вокруг прямой y=A мы ни задали, всегда найдётся вертикальный интервал шириной 2δ вокруг точки x₀, такой что график функции на всём этом интервале (кроме, возможно, самой точки x₀) целиком лежит внутри горизонтального коридора. Иными словами, при приближении x к x₀ значения функции неограниченно приближаются к A.</p></div>

<div class="lesson-card"><h3>Пример: доказательство предела линейной функции</h3>
<p>Докажем по определению: <code>lim(x→2) (3x + 1) = 7</code>.</p><ol>
<li>Рассмотрим модуль разности: <code>|f(x) − A| = |(3x+1) − 7| = |3x − 6| = 3|x − 2|</code>.</li>
<li>Зададим произвольное <code>ε > 0</code>. Требуем: <code>3|x − 2| < ε</code>.</li>
<li>Отсюда: <code>|x − 2| < ε/3</code>.</li>
<li>Выбираем <code>δ = ε/3</code>.</li>
<li>Проверка: если <code>0 < |x−2| < δ</code>, то <code>|(3x+1)−7| = 3|x−2| < 3·(ε/3) = ε</code>. ∎</li></ol></div>

<div class="lesson-card"><h3>Предел последовательности (дискретный случай)</h3>
<p>Последовательность — это функция натурального аргумента: <code>aₙ = a(n)</code>. Определение предела аналогично, но роль δ играет номер N:</p>
<p><code>lim(n→∞) aₙ = A</code>, если <code>∀ ε > 0 ∃ N : n ≥ N ⇒ |aₙ − A| < ε</code>.</p>
<p><b>Пример:</b> докажем, что <code>aₙ = 1/n → 0</code> при <code>n → ∞</code>. Задаём <code>ε > 0</code>. Ищем N: <code>|1/n − 0| < ε ⇔ 1/n < ε ⇔ n > 1/ε</code>. Выбираем <code>N = ⌈1/ε⌉ + 1</code>. Тогда для любого <code>n ≥ N</code> верно <code>n > 1/ε</code>, откуда <code>1/n < ε</code>. ∎</p></div>

<div class="example-block"><h4>ИБ-контекст: вероятность коллизии хеш-функции</h4>
<p>Пусть H — идеальная криптографическая хеш-функция с длиной выхода m бит. Вероятность коллизии для двух различных сообщений: <code>P(m) = 2⁻ᵐ</code>. Утверждение: «при неограниченном увеличении длины хеша вероятность коллизии стремится к нулю». Доказательство: для любого ε>0 выберем <code>m > log₂(1/ε)</code>. Тогда <code>|2⁻ᵐ − 0| = 2⁻ᵐ < 2^{−log₂(1/ε)} = ε</code>. Именно так формально обосновывается асимптотическая стойкость семейства SHA-3.</p></div>`, ["Фихтенгольц Г.М. Том 1, Глава 2, §1-4","Зорич В.А. Часть 1, Глава 3","Katz J., Lindell Y. «Introduction to Modern Cryptography», Ch. 3"])));

<div class="theory-block"><h3>Связь с информационной безопасностью</h3>
<p>Непрерывность и точки разрыва — естественная модель поведения систем защиты при достижении пороговых значений. Система обнаружения вторжений (IDS) имеет порог срабатывания: до N подозрительных событий — «норма», начиная с N+1 — «тревога». Это классический разрыв первого рода (скачок) в функции состояния системы. Аналогично, срабатывание блокировки учётной записи после K неудачных попыток входа — разрывная функция. Понимание односторонних пределов необходимо для анализа таких пороговых механизмов и поиска атак, использующих «пограничные» состояния.</p></div>

<div class="lesson-card"><h3>Односторонние пределы</h3>
<p><span class="definition">Предел слева</span> (x стремится к x₀ со стороны меньших значений): <code>lim(x→x₀⁻) f(x) = A</code>, если <code>∀ ε>0 ∃ δ>0 : x₀−δ < x < x₀ ⇒ |f(x)−A| < ε</code>.</p>
<p><span class="definition">Предел справа</span> (x стремится к x₀ со стороны больших значений): <code>lim(x→x₀⁺) f(x) = B</code>, если <code>∀ ε>0 ∃ δ>0 : x₀ < x < x₀+δ ⇒ |f(x)−B| < ε</code>.</p>
<p><b>Теорема:</b> Функция имеет предел в точке тогда и только тогда, когда оба односторонних предела существуют и равны: <code>lim(x→x₀) f(x) = A ⇔ lim(x→x₀⁻) f(x) = lim(x→x₀⁺) f(x) = A</code>.</p></div>

<div class="lesson-card"><h3>Непрерывность функции в точке</h3>
<p>Функция <code>f</code> непрерывна в точке <code>x₀</code>, если выполнены три условия:</p><ol>
<li><code>f(x₀)</code> определена (точка принадлежит области определения).</li>
<li><code>lim(x→x₀) f(x)</code> существует и конечен.</li>
<li><code>lim(x→x₀) f(x) = f(x₀)</code> (предел равен значению функции).</li></ol>
<p>На языке ε-δ: <code>∀ ε>0 ∃ δ>0 : |x−x₀| < δ ⇒ |f(x)−f(x₀)| < ε</code>. Отличие от определения предела: здесь не требуется <code>x ≠ x₀</code>, и в качестве A выступает само <code>f(x₀)</code>.</p>
<p>Функция непрерывна на интервале, если она непрерывна в каждой его точке. Свойства непрерывных функций: теорема Больцано-Коши (принимает все промежуточные значения), теорема Вейерштрасса (достигает минимума и максимума на отрезке).</p></div>

<div class="warning-block"><h4>Классификация точек разрыва</h4>
<p><b>Разрыв I рода (скачок):</b> оба односторонних предела конечны, но не равны. Величина скачка: <code>Δ = |lim(x→x₀⁺) f(x) − lim(x→x₀⁻) f(x)|</code>. Пример: функция Хевисайда <code>H(x) = {0, x<0; 1, x≥0}</code> — в точке 0 левый предел 0, правый 1, скачок 1.</p>
<p><b>Разрыв II рода:</b> хотя бы один из односторонних пределов бесконечен или не существует. Примеры: <code>f(x)=1/x</code> в точке 0 (бесконечные пределы разного знака); <code>f(x)=sin(1/x)</code> в точке 0 (пределы не существуют из-за осцилляции).</p>
<p><b>Устранимый разрыв:</b> предел существует, но не равен значению функции (или функция не определена в точке). Пример: <code>f(x)=sin(x)/x</code> в точке 0; доопределив f(0)=1, получаем непрерывную функцию.</p></div>

<div class="example-block"><h4>Применение в ИБ: пороговая сигнатура IDS</h4>
<p>Пусть IDS подсчитывает число подозрительных событий в минуту: <code>S(t)</code>. При <code>S < 100</code> состояние «норма», при <code>S ≥ 100</code> — «тревога». Функция состояния имеет разрыв I рода. Злоумышленник, зная порог, может держать активность на уровне 99 событий, оставаясь незамеченным. Анализ через односторонние пределы позволяет формально описать это «окно атаки».</p></div>`, ["Фихтенгольц Г.М. Том 1, Глава 2, §5","Кудрявцев Л.Д. «Курс математического анализа», Том 1","Зорич В.А. Часть 1, Глава 4"])));

<div class="theory-block"><h3>Роль производной в компьютерной безопасности</h3>
<p>Производная — фундамент градиентных методов оптимизации. Современные атаки на системы машинного обучения (Adversarial ML) используют градиент функции потерь для создания обманных примеров: FGSM, PGD, CW-атаки. Без понимания производной невозможно понять, как работают эти атаки. В дифференциальном криптоанализе используется понятие конечной разности — дискретный аналог производной — для анализа распространения разностей через раунды шифра.</p></div>

<div class="lesson-card"><h3>Определение производной</h3>
<p><span class="definition">Производной</span> функции <code>f</code> в точке <code>x₀</code> называется предел (если он существует):</p>
<p style="text-align:center;font-size:1.15rem;margin:14px 0;"><code>f'(x₀) = lim(h→0) [f(x₀ + h) − f(x₀)] / h</code></p>
<p>Другие обозначения: <code>df/dx</code>, <code>df/dx|_{x=x₀}</code>, <code>y'(x₀)</code>. Функция, имеющая производную в точке, называется <span class="definition">дифференцируемой</span> в этой точке.</p></div>

<div class="lesson-card"><h3>Геометрический и физический смысл</h3>
<p><b>Геометрически:</b> производная — угловой коэффициент (тангенс угла наклона) касательной к графику функции в данной точке. Уравнение касательной: <code>y = f(x₀) + f'(x₀)·(x − x₀)</code>.</p>
<p><b>Физически:</b> если <code>s(t)</code> — путь, пройденный к моменту t, то <code>s'(t)</code> — мгновенная скорость. Если <code>v(t)</code> — скорость, то <code>v'(t)</code> — ускорение.</p>
<p><b>В ИБ:</b> производная функции потерь по входным данным показывает, в каком направлении нужно изменить вход, чтобы максимально увеличить ошибку модели.</p></div>

<div class="lesson-card"><h3>Таблица производных элементарных функций</h3>
<table><tr><th>Функция</th><th>Производная</th></tr>
<tr><td><code>c</code> (константа)</td><td><code>0</code></td></tr>
<tr><td><code>xⁿ</code></td><td><code>n·xⁿ⁻¹</code></td></tr>
<tr><td><code>eˣ</code></td><td><code>eˣ</code></td></tr>
<tr><td><code>aˣ</code></td><td><code>aˣ·ln a</code></td></tr>
<tr><td><code>ln x</code></td><td><code>1/x</code></td></tr>
<tr><td><code>logₐ x</code></td><td><code>1/(x·ln a)</code></td></tr>
<tr><td><code>sin x</code></td><td><code>cos x</code></td></tr>
<tr><td><code>cos x</code></td><td><code>−sin x</code></td></tr>
<tr><td><code>tg x</code></td><td><code>1/cos²x</code></td></tr>
<tr><td><code>arcsin x</code></td><td><code>1/√(1−x²)</code></td></tr></table></div>

<div class="lesson-card"><h3>Правила дифференцирования</h3>
<table><tr><th>Правило</th><th>Формула</th></tr>
<tr><td>Сумма</td><td><code>(u+v)' = u' + v'</code></td></tr>
<tr><td>Произведение</td><td><code>(u·v)' = u'·v + u·v'</code></td></tr>
<tr><td>Частное</td><td><code>(u/v)' = (u'·v − u·v')/v²</code></td></tr>
<tr><td>Сложная функция</td><td><code>(f(g(x)))' = f'(g(x))·g'(x)</code></td></tr></table></div>

<div class="example-block"><h4>ИБ-пример: FGSM-атака</h4>
<p>Fast Gradient Sign Method: <code>x' = x + ε·sign(∇ₓJ(θ,x,y))</code>, где <code>J</code> — функция потерь, <code>∇ₓJ</code> — её градиент по входному изображению x. Добавляя шум амплитудой ε в направлении градиента, мы заставляем классификатор ошибиться. При ε=0.007 (в масштабе пикселей 0–1) изменения незаметны глазу, но полностью меняют предсказание нейросети.</p></div>`, ["Фихтенгольц Г.М. Том 1, Глава 3","Goodfellow I. et al. «Explaining and Harnessing Adversarial Examples» (arXiv:1412.6572)","Стренг Г. «Линейная алгебра и её применения»"])));

<div class="theory-block"><h3>Многомерный анализ в задачах ИБ</h3>
<p>Реальные системы защиты многомерны. Сигнатуры атак включают десятки и сотни признаков: частота запросов, энтропия payload, время отклика, распределение портов, геолокация IP. Классификаторы в IDS работают в многомерном пространстве признаков. Оптимизация гиперпараметров нейросетей — задача в пространствах размерности 10⁶ и выше. Без частных производных невозможно ни обучать такие модели, ни атаковать их.</p></div>

<div class="lesson-card"><h3>Определение частной производной</h3>
<p>Пусть <code>f(x₁, x₂, ..., xₙ)</code> — функция многих переменных. <span class="definition">Частная производная</span> по переменной <code>xᵢ</code> определяется как обычная производная по этой переменной при фиксированных всех остальных:</p>
<p style="text-align:center;margin:12px 0;"><code>∂f/∂xᵢ = lim(h→0) [f(x₁,...,xᵢ₋₁, xᵢ+h, xᵢ₊₁,...,xₙ) − f(x₁,...,xᵢ,...,xₙ)] / h</code></p>
<p>Обозначения: <code>∂f/∂xᵢ</code>, <code>f_{xᵢ}</code>, <code>f'_{xᵢ}</code>. Круглая ∂ подчёркивает, что это частная производная (в отличие от полной производной функции одной переменной).</p></div>

<div class="lesson-card"><h3>Градиент</h3>
<p><span class="definition">Градиент</span> функции <code>f</code> — вектор, составленный из всех её частных производных:</p>
<p style="text-align:center;margin:12px 0;"><code>∇f = (∂f/∂x₁, ∂f/∂x₂, ..., ∂f/∂xₙ)</code></p>
<p><b>Свойства градиента:</b></p><ul>
<li>Указывает направление <b>наискорейшего роста</b> функции.</li>
<li>Модуль градиента <code>|∇f|</code> равен скорости роста в этом направлении.</li>
<li>Вектор <code>−∇f</code> (антиградиент) — направление наискорейшего убывания.</li>
<li>Градиент всегда перпендикулярен линиям (поверхностям) уровня функции.</li></ul></div>

<div class="lesson-card"><h3>Градиентный спуск</h3>
<p>Основной алгоритм оптимизации в машинном обучении. Итеративная формула:</p>
<p style="text-align:center;"><code>x_{t+1} = x_t − η·∇f(x_t)</code></p>
<p>где <code>η</code> (learning rate) — скорость обучения, малый положительный параметр. На каждом шаге мы движемся в направлении антиградиента, уменьшая значение функции. Разновидности: SGD, Adam, RMSprop, AdaGrad — все основаны на этом принципе.</p></div>

<div class="example-block"><h4>ИБ-применение: атака уклонения на IDS</h4>
<p>Пусть ML-детектор вторжений обучен отличать нормальный трафик от атаки. Функция потерь <code>L(w, x)</code> измеряет ошибку на примере x. Атакующий решает обратную задачу: дано обученное w, нужно изменить вредоносный пример x так, чтобы модель классифицировала его как нормальный. Вычисляем градиент <code>∇ₓL</code> и движем вредоносный пример в направлении, уменьшающем уверенность модели в классе «атака»: <code>x' = x − η·∇ₓL</code>. Это — evasion attack.</p></div>`, ["Фихтенгольц Г.М. Том 1, Глава 6","Стренг Г. «Линейная алгебра», Глава 5","Goodfellow I., Bengio Y., Courville A. «Deep Learning», Глава 6"])));

<div class="theory-block"><h3>Роль интегралов в ИБ</h3>
<p>Интегральное исчисление пронизывает всю теорию информации и криптографию. Энтропия Шеннона для непрерывных случайных величин (дифференциальная энтропия) определяется через интеграл от плотности распределения. При анализе стойкости криптосистем мы суммируем (интегрируем) по пространству ключей. В стеганографии пропускная способность канала скрытой связи выражается через интеграл от взаимной информации. Анализ побочных электромагнитных излучений (ПЭМИН) требует вычисления энергии сигнала через интегралы.</p></div>

<div class="lesson-card"><h3>Неопределённый интеграл (первообразная)</h3>
<p>Функция <code>F(x)</code> называется <span class="definition">первообразной</span> функции <code>f(x)</code> на интервале, если <code>F'(x) = f(x)</code> для всех x из этого интервала. <span class="definition">Неопределённый интеграл:</span> <code>∫ f(x)dx = F(x) + C</code>, где C — произвольная постоянная. Неоднозначность связана с тем, что производная константы равна нулю: если F — первообразная, то F+C — тоже первообразная.</p>
<p><b>Таблица основных интегралов:</b></p>
<table><tr><th>Функция</th><th>Первообразная</th></tr>
<tr><td><code>∫ xⁿdx</code> (n≠−1)</td><td><code>xⁿ⁺¹/(n+1) + C</code></td></tr>
<tr><td><code>∫ dx/x</code></td><td><code>ln|x| + C</code></td></tr>
<tr><td><code>∫ eˣdx</code></td><td><code>eˣ + C</code></td></tr>
<tr><td><code>∫ sin x dx</code></td><td><code>−cos x + C</code></td></tr>
<tr><td><code>∫ cos x dx</code></td><td><code>sin x + C</code></td></tr></table></div>

<div class="lesson-card"><h3>Определённый интеграл (Римана)</h3>
<p>Пусть <code>f</code> непрерывна на отрезке <code>[a, b]</code>. Разобьём отрезок на n частей точками <code>a = x₀ < x₁ < ... < xₙ = b</code>. <span class="definition">Интегральная сумма:</span> <code>Sₙ = Σᵢ₌₁ⁿ f(ξᵢ)·Δxᵢ</code>, где <code>ξᵢ ∈ [xᵢ₋₁, xᵢ]</code> — произвольная точка в i-м подотрезке, <code>Δxᵢ = xᵢ − xᵢ₋₁</code>.</p>
<p><span class="definition">Определённый интеграл:</span> <code>∫ₐᵇ f(x)dx = lim(max Δxᵢ→0) Sₙ</code>, если этот предел существует и не зависит от способа разбиения и выбора точек ξᵢ.</p></div>

<div class="lesson-card"><h3>Формула Ньютона-Лейбница</h3>
<p>Если <code>F'(x) = f(x)</code> на <code>[a,b]</code>, то:</p>
<p style="text-align:center;font-size:1.1rem;"><code>∫ₐᵇ f(x)dx = F(b) − F(a)</code></p>
<p>Это фундаментальная теорема математического анализа, связывающая дифференцирование и интегрирование.</p></div>

<div class="example-block"><h4>ИБ-применение: дифференциальная энтропия</h4>
<p>Для непрерывной случайной величины X с плотностью p(x): <code>h(X) = −∫₋∞⁺∞ p(x)·log₂ p(x) dx</code>. Для равномерного распределения на [0, a]: плотность p(x)=1/a, энтропия <code>h = −∫₀ᵃ (1/a)·log₂(1/a) dx = log₂ a</code>. Для нормального распределения N(μ,σ²): <code>h = ½log₂(2πe·σ²)</code>. Интересно, что при фиксированной дисперсии именно нормальное распределение максимизирует дифференциальную энтропию.</p></div>`, ["Фихтенгольц Г.М. Том 2, Глава 9","Shannon C.E. «A Mathematical Theory of Communication» (1948)","Cover T.M., Thomas J.A. «Elements of Information Theory»"])));

    S1.push(L("1.6", "Числовые ряды и признаки сходимости", "math", makeContent(1, 6, "Числовые ряды и признаки сходимости", `
<div class="theory-block"><h3>Ряды в криптографии и теории информации</h3>
<p>Числовые ряды — фундаментальный инструмент анализа в криптографии. Многие вероятностные оценки стойкости выражаются в виде сумм бесконечных рядов. Например, вероятность успеха многократной атаки на криптосистему часто записывается как сумма геометрической прогрессии. Энтропийные ряды используются в доказательствах теорем кодирования Шеннона. При анализе сходимости итеративных алгоритмов криптоанализа (например, метод градиентного спуска для нахождения ключа) мы опираемся на признаки сходимости рядов.</p>
<p>Кроме того, в квантовой криптографии амплитуды вероятностей образуют ряды, сумма квадратов модулей которых должна сходиться к единице. Без понимания сходимости невозможно формально обосновать корректность квантовых протоколов.</p></div>
<div class="lesson-card"><h3>Основные определения</h3>
<p><span class="definition">Числовой ряд</span> — формальная сумма бесконечной последовательности чисел: <code>Σₙ₌₁^∞ aₙ = a₁ + a₂ + a₃ + ...</code>.</p>
<p><span class="definition">Частичная сумма</span> порядка n: <code>Sₙ = a₁ + a₂ + ... + aₙ</code>.</p>
<p>Ряд <span class="definition">сходится</span> к сумме S, если существует конечный предел последовательности частичных сумм: <code>lim(n→∞) Sₙ = S</code>. Если предел не существует или бесконечен, ряд <span class="definition">расходится</span>.</p>
<p><b>Остаток ряда</b> после n-го члена: <code>Rₙ = S − Sₙ = Σₖ₌ₙ₊₁^∞ aₖ</code>. Для сходящегося ряда <code>lim(n→∞) Rₙ = 0</code>.</p></div>
<div class="lesson-card"><h3>Необходимый признак сходимости</h3>
<p>Если ряд <code>Σ aₙ</code> сходится, то <code>lim(n→∞) aₙ = 0</code>.</p>
<p><b>Доказательство:</b> <code>aₙ = Sₙ − Sₙ₋₁</code>. Так как ряд сходится, <code>Sₙ → S</code> и <code>Sₙ₋₁ → S</code>. Тогда <code>aₙ → S − S = 0</code>. ∎</p>
<div class="warning-block"><h4>Важно!</h4><p>Необходимый признак <b>не является достаточным</b>. Классический контрпример — гармонический ряд <code>Σ 1/n</code>: его общий член стремится к нулю, но ряд расходится (доказывается через интегральный признак).</p></div></div>
<div class="lesson-card"><h3>Достаточные признаки сходимости</h3>
<table><tr><th>Признак</th><th>Формулировка</th><th>Применение</th></tr>
<tr><td><b>Даламбера</b></td><td>Если <code>lim |aₙ₊₁/aₙ| = q</code>, то при q<1 ряд сходится, при q>1 — расходится, при q=1 — неопределён.</td><td>Ряды с факториалами и степенями</td></tr>
<tr><td><b>Радикальный Коши</b></td><td>Если <code>lim ⁿ√|aₙ| = q</code>, то при q<1 сходится, при q>1 расходится.</td><td>Ряды с n-ми степенями</td></tr>
<tr><td><b>Интегральный Коши</b></td><td>Если <code>f(x)</code> монотонно убывает и <code>f(n)=aₙ</code>, то ряд и интеграл <code>∫₁^∞ f(x)dx</code> сходятся или расходятся одновременно.</td><td>Ряды вида Σ 1/nᵖ</td></tr>
<tr><td><b>Сравнения</b></td><td>Если <code>0 ≤ aₙ ≤ bₙ</code> и Σbₙ сходится, то Σaₙ сходится. Если Σbₙ расходится и aₙ ≥ bₙ, то Σaₙ расходится.</td><td>Универсальный</td></tr>
<tr><td><b>Лейбница</b></td><td>Для знакочередующегося ряда: если |aₙ| монотонно убывает и стремится к 0, ряд сходится.</td><td>Знакочередующиеся ряды</td></tr></table></div>
<div class="lesson-card"><h3>Важнейшие эталонные ряды</h3>
<table><tr><th>Ряд</th><th>Сходимость</th><th>Сумма (если сходится)</th></tr>
<tr><td>Геометрический <code>Σ aqⁿ</code></td><td>Сходится при |q|<1</td><td><code>a/(1−q)</code></td></tr>
<tr><td>Гармонический <code>Σ 1/n</code></td><td>Расходится</td><td>—</td></tr>
<tr><td>Обобщённый гармонический <code>Σ 1/nᵖ</code></td><td>Сходится при p>1</td><td>Дзета-функция Римана ζ(p)</td></tr>
<tr><td><code>Σ 1/n!</code></td><td>Сходится</td><td>e − 1</td></tr></table></div>
<div class="example-block"><h4>ИБ-пример: анализ стойкости парольной защиты</h4>
<p>Злоумышленник перебирает пароли. Пусть вероятность угадать пароль с k-й попытки равна p (геометрическое распределение). Вероятность, что пароль будет взломан за не более чем N попыток: <code>P(N) = p + (1−p)p + (1−p)²p + ... + (1−p)ᴺ⁻¹p</code>. Это частичная сумма геометрической прогрессии: <code>P(N) = 1 − (1−p)ᴺ</code>. При N→∞ частичная сумма сходится к 1 (полная вероятность взлома). Скорость сходимости экспоненциальная — именно поэтому даже небольшое увеличение энтропии пароля резко повышает стойкость.</p></div>`, ["Фихтенгольц Г.М. Том 2, Глава 11, §1-6","Кудрявцев Л.Д. «Курс математического анализа», Том 2","Shannon C.E. «A Mathematical Theory of Communication»"])));

    S1.push(L("1.7", "Степенные ряды и ряд Тейлора", "math", makeContent(1, 7, "Степенные ряды и ряд Тейлора", `
<div class="theory-block"><h3>Ряды Тейлора в криптоанализе</h3>
<p>Разложение функций в степенные ряды — ключевой инструмент аппроксимации. В криптографии: линейный криптоанализ аппроксимирует нелинейные S-блоки линейными функциями. Математически это взятие первого члена разложения булевой функции в базисе Уолша-Адамара — аналог ряда Тейлора для функций над полем GF(2). Дифференциальный криптоанализ, в свою очередь, исследует производные (разности) высших порядков, что соответствует старшим членам разложения.</p>
<p>В машинном обучении для задач безопасности градиентные методы используют разложение функции потерь в ряд Тейлора до второго члена (матрица Гессе) для оптимизации скорости сходимости.</p></div>
<div class="lesson-card"><h3>Степенной ряд</h3>
<p><span class="definition">Степенной ряд</span> с центром в точке a: <code>Σₙ₌₀^∞ cₙ·(x−a)ⁿ = c₀ + c₁(x−a) + c₂(x−a)² + ...</code>.</p>
<p><b>Радиус сходимости R</b> — такое число, что при |x−a|<R ряд сходится, при |x−a|>R — расходится. Вычисляется по формуле Коши-Адамара: <code>1/R = lim sup ⁿ√|cₙ|</code> или через признак Даламбера: <code>R = lim |cₙ/cₙ₊₁|</code>.</p></div>
<div class="lesson-card"><h3>Ряд Тейлора</h3>
<p>Если функция <code>f(x)</code> бесконечно дифференцируема в окрестности точки <code>a</code>, то её можно представить в виде:</p>
<p style="text-align:center;font-size:1.1rem;margin:12px 0;"><code>f(x) = Σₙ₌₀^∞ [f⁽ⁿ⁾(a) / n!] · (x−a)ⁿ</code></p>
<p>где <code>f⁽ⁿ⁾(a)</code> — n-я производная в точке a. При <code>a = 0</code> ряд называется <b>рядом Маклорена</b>.</p></div>
<div class="lesson-card"><h3>Важнейшие разложения</h3>
<table><tr><th>Функция</th><th>Ряд Маклорена</th><th>Радиус сходимости</th></tr>
<tr><td><code>eˣ</code></td><td><code>Σ xⁿ/n! = 1 + x + x²/2! + x³/3! + ...</code></td><td>∞</td></tr>
<tr><td><code>sin x</code></td><td><code>Σ (−1)ⁿx²ⁿ⁺¹/(2n+1)!</code></td><td>∞</td></tr>
<tr><td><code>cos x</code></td><td><code>Σ (−1)ⁿx²ⁿ/(2n)!</code></td><td>∞</td></tr>
<tr><td><code>ln(1+x)</code></td><td><code>Σ (−1)ⁿ⁺¹xⁿ/n</code></td><td>1</td></tr>
<tr><td><code>1/(1−x)</code></td><td><code>Σ xⁿ</code> (геометрический)</td><td>1</td></tr>
<tr><td><code>arctan x</code></td><td><code>Σ (−1)ⁿx²ⁿ⁺¹/(2n+1)</code></td><td>1</td></tr></table></div>
<div class="example-block"><h4>ИБ-применение: Линейный криптоанализ</h4>
<p>Линейный криптоанализ (Matsui, 1993) ищет линейное соотношение между битами открытого текста, шифротекста и ключа, выполняющееся с вероятностью p ≠ 1/2. Математически это проекция нелинейной булевой функции S-блока на линейную оболочку — первый член разложения в базисе Уолша-Адамара. Эффективность атаки измеряется через <b>линейную характеристику</b> (linear trail) — произведение корреляций последовательных раундов. Это прямое применение степенных рядов: каждый следующий раунд добавляет множитель корреляции.</p></div>`, ["Фихтенгольц Г.М. Том 2, Глава 11, §7-9","Matsui M. «Linear Cryptanalysis Method for DES Cipher» (EUROCRYPT 1993)","Daemen J., Rijmen V. «The Design of Rijndael»"])));

    S1.push(L("1.8", "Ряды Фурье и спектральный анализ", "math", makeContent(1, 8, "Ряды Фурье и спектральный анализ", `
<div class="theory-block"><h3>Ключевая тема для технической защиты информации</h3>
<p>Ряды Фурье — математический фундамент спектрального анализа, а значит, и всей технической защиты информации. Любой периодический сигнал может быть представлен как сумма гармонических колебаний (синусов и косинусов) кратных частот. Именно это разложение позволяет анализировать побочные электромагнитные излучения (ПЭМИН), акустические утечки и виброакустические каналы.</p>
<p>Монитор компьютера излучает электромагнитные волны на частотах тактового генератора видеокарты. Клавиатура создаёт акустические сигналы при нажатии клавиш. Всё это — периодические или почти периодические сигналы, которые раскладываются в ряд Фурье, и информативные гармоники могут быть выделены, усилены и проанализированы злоумышленником. Задача специалиста по технической защите — понимать этот механизм и применять контрмеры.</p></div>
<div class="lesson-card"><h3>Определение ряда Фурье</h3>
<p>Пусть <code>f(x)</code> — периодическая функция с периодом <code>T = 2π/ω₀</code>, где <code>ω₀</code> — основная угловая частота. Тогда (при определённых условиях) функция представима в виде:</p>
<p style="text-align:center;font-size:1.05rem;margin:12px 0;"><code>f(x) = a₀/2 + Σₙ₌₁^∞ [aₙ·cos(nω₀x) + bₙ·sin(nω₀x)]</code></p>
<p>где коэффициенты Фурье вычисляются по формулам:</p>
<p><code>aₙ = (2/T) ∫₀ᵀ f(x)·cos(nω₀x) dx</code> — косинусные коэффициенты (чётная часть),</p>
<p><code>bₙ = (2/T) ∫₀ᵀ f(x)·sin(nω₀x) dx</code> — синусные коэффициенты (нечётная часть),</p>
<p><code>a₀ = (2/T) ∫₀ᵀ f(x) dx</code> — удвоенное среднее значение (постоянная составляющая).</p></div>
<div class="lesson-card"><h3>Амплитудно-фазовая форма</h3>
<p>Используя формулу <code>a·cos α + b·sin α = A·cos(α − φ)</code>, где амплитуда <code>A = √(a² + b²)</code> и фаза <code>φ = arctan(b/a)</code>, ряд Фурье записывается как:</p>
<p style="text-align:center;"><code>f(x) = A₀/2 + Σₙ₌₁^∞ Aₙ·cos(nω₀x − φₙ)</code></p>
<p><b>Спектр сигнала</b> — набор амплитуд <code>Aₙ</code> для каждой частоты <code>nω₀</code>. <b>Фазовый спектр</b> — набор фаз <code>φₙ</code>.</p></div>
<div class="lesson-card"><h3>Условия Дирихле (достаточные условия сходимости)</h3>
<p>Ряд Фурье сходится к <code>f(x)</code> в точках непрерывности, если:</p><ol>
<li>Функция периодична и ограничена на периоде.</li>
<li>Имеет конечное число точек разрыва I рода (скачков) на периоде.</li>
<li>Имеет конечное число экстремумов на периоде.</li></ol>
<p>В точках разрыва x₀ ряд Фурье сходится к среднему арифметическому: <code>[f(x₀⁻) + f(x₀⁺)] / 2</code>.</p></div>
<div class="lesson-card"><h3>Явление Гиббса</h3>
<p>При аппроксимации разрывной функции конечной суммой Фурье вблизи точки разрыва возникают выбросы, амплитуда которых не уменьшается с ростом числа гармоник, а стремится к ~9% от величины скачка. Это принципиально важно при анализе цифровых сигналов: резкие перепады (фронты импульсов) порождают высокочастотные гармоники — именно они являются источником наиболее информативных побочных излучений.</p></div>
<div class="warning-block"><h4>Практическое значение: Атака TEMPEST</h4>
<p>Видеосигнал монитора — это периодическая развёртка с частотой кадровой (60–144 Гц) и строчной (десятки кГц) синхронизации. Излучение на гармониках строчной частоты содержит информацию об изображении. С помощью направленной антенны и анализатора спектра изображение восстанавливается на расстоянии до 50 метров.</p>
<p><b>Защита:</b></p><ul>
<li><b>Экранирование:</b> клетка Фарадея (металлический корпус или сетка), затухание электромагнитного поля.</li>
<li><b>Генераторы шума:</b> добавление широкополосного сигнала, маскирующего информативные гармоники.</li>
<li><b>Оптоволоконные линии:</b> отсутствие электромагнитного излучения в канале передачи данных.</li>
<li><b>Фильтрация питания:</b> исключение утечки информационного сигнала по цепям электропитания.</li></ul></div>`, ["Фихтенгольц Г.М. Том 3, Глава 12","Баскаков С.И. «Радиотехнические цепи и сигналы», Главы 2-3","Меньшаков Ю.К. «Основы технической защиты информации», Глава 3","ГОСТ Р 53113.1-2008 «Защита информации. Техническая защита информации»"])));

    S1.push(L("1.9", "Линейная алгебра: матрицы и операции", "math", makeContent(1, 9, "Линейная алгебра: матрицы и операции", `
<div class="theory-block"><h3>Матрицы — язык криптографии</h3>
<p>Линейная алгебра — фундаментальный математический аппарат современной криптографии. Практически все современные блочные шифры используют линейные преобразования: AES применяет умножение на фиксированную матрицу 4×4 над полем GF(2⁸) в операции MixColumns; шифр «Кузнечик» (ГОСТ 34.12-2018) использует линейное преобразование L, представимое матрицей 16×16 над GF(2).</p>
<p>В криптоанализе матрицы используются повсеместно: линейный криптоанализ строит матрицы корреляции,差分ный криптоанализ оперирует матрицами переходов разностей. Понимание матричных операций абсолютно необходимо для чтения современной криптографической литературы.</p></div>
<div class="lesson-card"><h3>Определение матрицы</h3>
<p><span class="definition">Матрица</span> размера m×n — прямоугольная таблица из m строк и n столбцов: <code>A = [aᵢⱼ]</code>, где <code>i = 1..m</code> — номер строки, <code>j = 1..n</code> — номер столбца.</p>
<p><b>Специальные виды:</b></p><ul>
<li><b>Квадратная матрица:</b> m = n. Имеет главную диагональ (i = j).</li>
<li><b>Диагональная:</b> все элементы вне главной диагонали равны 0.</li>
<li><b>Единичная матрица I:</b> диагональная с единицами на диагонали.</li>
<li><b>Нулевая матрица:</b> все элементы равны 0.</li>
<li><b>Симметричная:</b> <code>A = Aᵀ</code> (aᵢⱼ = aⱼᵢ).</li></ul></div>
<div class="lesson-card"><h3>Операции над матрицами</h3>
<table><tr><th>Операция</th><th>Определение</th><th>Условие</th></tr>
<tr><td><b>Сложение</b></td><td><code>(A+B)ᵢⱼ = aᵢⱼ + bᵢⱼ</code></td><td>Одинаковый размер</td></tr>
<tr><td><b>Умножение на скаляр</b></td><td><code>(kA)ᵢⱼ = k·aᵢⱼ</code></td><td>—</td></tr>
<tr><td><b>Умножение матриц</b></td><td><code>(AB)ᵢⱼ = Σₖ₌₁ⁿ aᵢₖ·bₖⱼ</code></td><td>Ширина A = высота B</td></tr>
<tr><td><b>Транспонирование</b></td><td><code>(Aᵀ)ᵢⱼ = aⱼᵢ</code></td><td>—</td></tr>
<tr><td><b>След</b></td><td><code>Tr(A) = Σ aᵢᵢ</code></td><td>Квадратная</td></tr></table>
<p><b>Свойства умножения:</b> некоммутативно (AB ≠ BA в общем случае), ассоциативно ((AB)C = A(BC)), дистрибутивно (A(B+C) = AB + AC).</p></div>
<div class="lesson-card"><h3>Обратная матрица</h3>
<p>Квадратная матрица A называется <span class="definition">обратимой</span> (невырожденной), если существует матрица <code>A⁻¹</code> такая, что <code>AA⁻¹ = A⁻¹A = I</code>. Необходимое и достаточное условие: <code>det(A) ≠ 0</code>.</p>
<p>Свойства: <code>(AB)⁻¹ = B⁻¹A⁻¹</code>, <code>(A⁻¹)⁻¹ = A</code>, <code>(Aᵀ)⁻¹ = (A⁻¹)ᵀ</code>.</p></div>
<div class="example-block"><h4>ИБ-пример: AES MixColumns</h4>
<p>В шифре AES состояние (state) — матрица 4×4 байт. Операция MixColumns умножает каждый столбец на фиксированную матрицу над полем GF(2⁸):</p>
<pre data-lang="Матрица MixColumns">
[ 02 03 01 01 ]
[ 01 02 03 01 ]
[ 01 01 02 03 ]
[ 03 01 01 02 ]</pre>
<p>Умножение выполняется в конечном поле: байты интерпретируются как многочлены, сложение — XOR, умножение на 02 — сдвиг влево с XOR константы 0x1B при переполнении. Обратная операция (InvMixColumns) использует обратную матрицу — вот зачем нужны обратные матрицы в криптографии.</p></div>`, ["Стренг Г. «Линейная алгебра и её применения», Главы 1-3","Daemen J., Rijmen V. «The Design of Rijndael», Глава 3","ГОСТ Р 34.12-2018 «Кузнечик»"])));

    S1.push(L("1.10", "Определители и их свойства", "math", makeContent(1, 10, "Определители и их свойства", `
<div class="lesson-card"><h3>Определение</h3>
<p><span class="definition">Определитель</span> (детерминант) квадратной матрицы A порядка n — это число, вычисляемое по определённому правилу и обозначаемое <code>det(A)</code> или <code>|A|</code>.</p>
<p><b>Для матрицы 2×2:</b> <code>det[a b; c d] = ad − bc</code>.</p>
<p><b>Для матрицы 3×3 (правило Саррюса):</b> сумма произведений трёх элементов по главным диагоналям минус сумма произведений по побочным.</p>
<p><b>Общее определение</b> (разложение по первой строке): <code>det(A) = Σⱼ₌₁ⁿ (−1)¹⁺ʲ a₁ⱼ·M₁ⱼ</code>, где <code>M₁ⱼ</code> — минор (определитель подматрицы без 1-й строки и j-го столбца).</p></div>
<div class="lesson-card"><h3>Свойства определителей</h3><ol>
<li><code>det(I) = 1</code>.</li>
<li><code>det(Aᵀ) = det(A)</code>.</li>
<li><b>Мультипликативность:</b> <code>det(AB) = det(A)·det(B)</code>.</li>
<li><code>det(A⁻¹) = 1/det(A)</code> (если A обратима).</li>
<li>Если две строки (столбца) поменять местами — определитель меняет знак.</li>
<li>Если строка (столбец) состоит из нулей — определитель равен 0.</li>
<li>Если две строки пропорциональны — определитель равен 0.</li>
<li>Прибавление к строке кратной другой строки не меняет определитель.</li>
<li><b>Критерий обратимости:</b> A обратима ⇔ <code>det(A) ≠ 0</code>.</li></ol></div>
<div class="lesson-card"><h3>Геометрический смысл</h3>
<p>Определитель матрицы n×n равен ориентированному n-мерному объёму параллелепипеда, построенного на векторах-строках (или столбцах) матрицы. <code>det(A)=0</code> означает, что векторы линейно зависимы и параллелепипед вырожден.</p></div>
<div class="example-block"><h4>ИБ-применение</h4><p>В криптоанализе определитель используется для проверки обратимости линейных преобразований. Если матрица MixColumns в AES была бы вырожденной (<code>det=0</code>), шифрование стало бы необратимым — информацию нельзя было бы расшифровать. Разработчики Rijndael специально выбирали матрицу с ненулевым определителем в GF(2⁸).</p></div>`, ["Стренг Г. «Линейная алгебра», Глава 4","Daemen J., Rijmen V. «The Design of Rijndael»"])));

    S1.push(L("1.11", "Собственные значения и векторы", "math", makeContent(1, 11, "Собственные значения и векторы", `
<div class="lesson-card"><h3>Определение</h3>
<p>Пусть A — квадратная матрица n×n. Ненулевой вектор <code>v</code> называется <span class="definition">собственным вектором</span> матрицы A, если существует число λ такое, что:</p>
<p style="text-align:center;font-size:1.1rem;"><code>Av = λv</code></p>
<p>Число λ называется <span class="definition">собственным значением</span>, соответствующим вектору v.</p></div>
<div class="lesson-card"><h3>Характеристическое уравнение</h3>
<p>Перепишем: <code>Av − λv = 0 ⇒ (A − λI)v = 0</code>. Для существования ненулевого решения необходимо и достаточно, чтобы матрица (A−λI) была вырожденной:</p>
<p style="text-align:center;"><code>det(A − λI) = 0</code></p>
<p>Это <b>характеристическое уравнение</b>. Его левая часть — характеристический многочлен степени n. Корни этого многочлена — собственные значения λ.</p></div>
<div class="lesson-card"><h3>Спектральное разложение</h3>
<p>Если матрица имеет n линейно независимых собственных векторов, она <span class="definition">диагонализуема</span>: <code>A = VΛV⁻¹</code>, где V — матрица из собственных векторов (по столбцам), Λ — диагональная матрица собственных значений.</p></div>
<div class="example-block"><h4>ИБ-применение: PCA в обнаружении аномалий</h4>
<p>Метод главных компонент (PCA) использует собственные векторы ковариационной матрицы данных для снижения размерности. В обнаружении вторжений PCA применяется для выделения главных признаков сетевого трафика и выявления аномалий: точки, далеко отстоящие от подпространства главных компонент, — потенциальные атаки.</p></div>`, ["Стренг Г. «Линейная алгебра», Глава 6","Shlens J. «A Tutorial on Principal Component Analysis»"])));

    S1.push(L("1.12", "SVD и его применение в стеганографии", "math", makeContent(1, 12, "Сингулярное разложение и стеганография", `
<div class="lesson-card"><h3>Определение SVD</h3>
<p><span class="definition">Сингулярное разложение</span> (Singular Value Decomposition) — представление произвольной матрицы A размера m×n в виде:</p>
<p style="text-align:center;font-size:1.1rem;"><code>A = U · Σ · Vᵀ</code></p>
<p>где:</p><ul>
<li><b>U</b> — ортогональная матрица m×m (левые сингулярные векторы),</li>
<li><b>Σ</b> — диагональная матрица m×n с неотрицательными сингулярными числами σᵢ на диагонали в порядке убывания,</li>
<li><b>V</b> — ортогональная матрица n×n (правые сингулярные векторы).</li></ul></div>
<div class="lesson-card"><h3>Свойства</h3><ul>
<li>SVD существует для <b>любой</b> матрицы (в отличие от спектрального разложения).</li>
<li>Сингулярные числа — квадратные корни из собственных значений <code>AᵀA</code>.</li>
<li>Количество ненулевых сингулярных чисел равно рангу матрицы.</li>
<li>Наилучшее приближение матрицы ранга r (в смысле нормы Фробениуса) даётся усечением SVD до r наибольших сингулярных чисел (теорема Экхарта-Янга).</li></ul></div>
<div class="example-block"><h4>Применение в стеганографии</h4>
<p>SVD используется для внедрения водяных знаков в изображения. Изображение (матрица пикселей) раскладывается: <code>A = UΣVᵀ</code>. Водяной знак внедряется в сингулярные числа Σ (небольшая модификация значений σᵢ), после чего изображение восстанавливается. Преимущество: модификация сингулярных чисел устойчива к сжатию JPEG, обрезке и повороту — водяной знак сохраняется при типичных трансформациях.</p></div>`, ["Стренг Г. «Линейная алгебра», Глава 7","Cox I. et al. «Digital Watermarking»"])));

    S1.push(L("1.13", "Комбинаторика: размещения и сочетания", "math", makeContent(1, 13, "Комбинаторика: размещения и сочетания", `
<div class="theory-block"><h3>Основа анализа пространства ключей</h3>
<p>Комбинаторика — математический фундамент для оценки мощности криптографических ключей. Когда мы говорим «ключ длиной 256 бит», мы имеем в виду 2²⁵⁶ возможных значений. Это число — результат комбинаторного подсчёта. Без комбинаторики невозможно рассчитать энтропию источника ключей, оценить стойкость парольной защиты или проанализировать сложность атаки полным перебором.</p></div>
<div class="lesson-card"><h3>Основные комбинаторные объекты</h3>
<table><tr><th>Объект</th><th>Формула</th><th>Порядок важен?</th><th>Пример</th></tr>
<tr><td><b>Перестановки</b> n элементов</td><td><code>P(n) = n!</code></td><td>Да</td><td>Расстановка 8 букв в пароле</td></tr>
<tr><td><b>Размещения</b> из n по k</td><td><code>A(n,k) = n!/(n−k)!</code></td><td>Да</td><td>Выбор 3 цифр для PIN с учётом порядка</td></tr>
<tr><td><b>Сочетания</b> из n по k</td><td><code>C(n,k) = n!/(k!(n−k)!)</code></td><td>Нет</td><td>Выбор 5 дисков для RAID-массива</td></tr>
<tr><td><b>Сочетания с повторениями</b></td><td><code>C̃(n,k) = C(n+k−1,k)</code></td><td>Нет</td><td>Распределение k запросов по n серверам</td></tr></table></div>
<div class="example-block"><h4>Оценка стойкости пароля</h4>
<p>Пароль из 8 символов латиницы (строчные + заглавные) и цифр: алфавит 26+26+10 = 62 символа. Число возможных паролей = 62⁸ ≈ 2.18·10¹⁴. При скорости перебора 10⁹ паролей/сек время полного перебора ≈ 2.18·10⁵ секунд ≈ 2.5 дня. Вывод: 8 символов недостаточно. Добавление спецсимволов (ещё 32) даёт алфавит 94: 94⁸ ≈ 6.1·10¹⁵ ≈ 70 дней. Добавление длины до 12: 94¹² ≈ 4.75·10²³ — тепловая смерть Вселенной наступит раньше.</p></div>`, ["Виленкин Н.Я. «Комбинаторика»","Гнеденко Б.В. «Курс теории вероятностей»","NIST SP 800-63B: Digital Identity Guidelines"])));

    S1.push(L("1.14", "Теория вероятностей: аксиоматика", "math", makeContent(1, 14, "Теория вероятностей: аксиоматика Колмогорова", `
<div class="theory-block"><h3>Вероятность в криптографии</h3>
<p>Современная криптография вероятностна по своей природе. Стойкость определяется как вероятность успеха атаки. Понятие пренебрежимо малой вероятности (negligible function) — центральное в доказуемой безопасности. Криптографический генератор случайных чисел должен производить статистически неотличимые от истинно случайных последовательности — а это проверяется статистическими тестами, основанными на теории вероятностей.</p></div>
<div class="lesson-card"><h3>Аксиомы Колмогорова (1933)</h3>
<p><span class="definition">Вероятностное пространство</span> — тройка <code>(Ω, F, P)</code>, где:</p><ul>
<li><b>Ω</b> — пространство элементарных исходов (все возможные результаты эксперимента).</li>
<li><b>F</b> — σ-алгебра событий (набор подмножеств Ω, замкнутый относительно дополнений и счётных объединений).</li>
<li><b>P: F → [0,1]</b> — вероятностная мера.</li></ul>
<p><b>Аксиомы:</b></p><ol>
<li><b>Неотрицательность:</b> <code>P(A) ≥ 0</code> для любого A ∈ F.</li>
<li><b>Нормированность:</b> <code>P(Ω) = 1</code>.</li>
<li><b>Счётная аддитивность:</b> для попарно несовместных A₁, A₂, ... <code>P(∪ᵢ Aᵢ) = Σᵢ P(Aᵢ)</code>.</li></ol></div>
<div class="lesson-card"><h3>Свойства вероятности</h3><ul>
<li><code>P(∅) = 0</code></li>
<li><code>P(Ā) = 1 − P(A)</code></li>
<li><code>P(A∪B) = P(A) + P(B) − P(A∩B)</code></li>
<li>Если A ⊆ B, то <code>P(A) ≤ P(B)</code></li></ul></div>`, ["Гнеденко Б.В. «Курс теории вероятностей»","Колмогоров А.Н. «Основные понятия теории вероятностей» (1933)","Katz, Lindell «Introduction to Modern Cryptography», Ch. 1"])));

    S1.push(L("1.15", "Условная вероятность и формула Байеса", "math", makeContent(1, 15, "Условная вероятность и формула Байеса", `
<div class="theory-block"><h3>Байесовский подход в ИБ</h3>
<p>Формула Байеса — краеугольный камень современных систем обнаружения вторжений, спам-фильтров и forensic analysis. Она позволяет пересчитывать вероятность гипотезы (например, «система атакована») при поступлении новых свидетельств (подозрительных событий). Именно байесовский подход лежит в основе adaptive security.</p></div>
<div class="lesson-card"><h3>Определения</h3>
<p><span class="definition">Условная вероятность</span> события A при условии события B: <code>P(A|B) = P(A∩B)/P(B)</code>, где <code>P(B) > 0</code>.</p></div>
<div class="lesson-card"><h3>Формула Байеса</h3>
<p style="text-align:center;font-size:1.1rem;"><code>P(H|E) = P(E|H)·P(H) / P(E)</code></p>
<p>где: <code>P(H)</code> — априорная вероятность гипотезы, <code>P(E|H)</code> — правдоподобие (вероятность свидетельства при истинности гипотезы), <code>P(E) = Σ P(E|Hᵢ)P(Hᵢ)</code> — полная вероятность свидетельства.</p></div>
<div class="example-block"><h4>Спам-фильтр</h4>
<p>Пусть письмо содержит слово «виагра». Вероятность, что письмо — спам, при условии наличия этого слова: <code>P(спам|слово) = P(слово|спам)·P(спам) / P(слово)</code>. Если <code>P(спам)=0.3</code>, <code>P(слово|спам)=0.4</code>, <code>P(слово)=0.15</code>, то <code>P(спам|слово)=0.4·0.3/0.15=0.8</code>. После учёта свидетельства вероятность спама выросла с 30% до 80%.</p></div>`, ["Гнеденко Б.В. «Курс теории вероятностей»","Mitchell T. «Machine Learning», Ch. 6 (Naive Bayes)","NIST SP 800-30: Risk Assessment"])));

    S2.push(L("2.1", "Модель памяти процесса в C", "cs", makeContent(2, 1, "Модель памяти процесса в C", `
<div class="theory-block"><h3>Базовые знания для эксплуатации уязвимостей</h3><p>Любая атака на память — манипуляция сегментами процесса. Понимание архитектуры памяти — необходимое условие для написания эксплойтов и создания защищённых приложений. Современные защитные механизмы (ASLR, NX, PIE, Stack Canary) опираются именно на сегментную организацию памяти.</p><p>Модель памяти процесса в C — это не просто академическая абстракция. Это карта, по которой ориентируется злоумышленник. Знание того, где лежат код, данные, стек и куча, позволяет целенаправленно искать уязвимости и разрабатывать эксплойты под конкретные условия.</p></div>
<div class="lesson-card"><h3>Пять сегментов процесса</h3><table><tr><th>Сегмент</th><th>Содержимое</th><th>Права доступа</th><th>Направление роста</th></tr><tr><td><b>Text (Код)</b></td><td>Машинные инструкции программы</td><td>r-x (чтение, выполнение)</td><td>Фиксирован</td></tr><tr><td><b>Data</b></td><td>Инициализированные глобальные и статические переменные</td><td>rw- (чтение, запись)</td><td>Фиксирован</td></tr><tr><td><b>BSS</b></td><td>Неинициализированные глобальные и статические переменные (обнуляются при старте)</td><td>rw-</td><td>Фиксирован</td></tr><tr><td><b>Heap (Куча)</b></td><td>Динамически выделяемая память (malloc, calloc, realloc, new в C++)</td><td>rw-</td><td>↑ Вверх (к старшим адресам)</td></tr><tr><td><b>Stack (Стек)</b></td><td>Локальные переменные, аргументы функций, адреса возврата, сохранённые регистры</td><td>rw-</td><td>↓ Вниз (к младшим адресам)</td></tr></table></div>
<div class="lesson-card"><h3>Детальное устройство стека</h3><p>Кадр стека (stack frame) для функции состоит из:</p><ol><li><b>Аргументы функции</b> (в x86-64 первые 6 в регистрах, остальные на стеке).</li><li><b>Адрес возврата</b> (куда перейти после завершения функции).</li><li><b>Сохранённый RBP</b> (указатель базы предыдущего кадра).</li><li><b>Локальные переменные</b> (в порядке объявления, но компилятор может переупорядочивать).</li><li><b>Буферы</b> (массивы символов и т.п.).</li></ol></div>
<div class="warning-block"><h4>Конфликт Stack и Heap</h4><p>Стек растёт от старших адресов к младшим, куча — наоборот. При неограниченной рекурсии или утечке памяти они могут столкнуться — это называется <b>memory exhaustion</b>. Злоумышленник может намеренно спровоцировать такую ситуацию для вызова отказа в обслуживании (DoS).</p></div>`, ["Bryant R., O'Hallaron D. «CS:APP», Глава 3","Kernighan B., Ritchie D. «The C Programming Language»","Erickson J. «Hacking: The Art of Exploitation»"])));

    S2.push(L("2.2", "Указатели и адресная арифметика", "cs", makeContent(2, 2, "Указатели и адресная арифметика", `
<div class="lesson-card"><h3>Синтаксис указателей</h3><pre data-lang="C">int x = 42;        // выделено 4 байта на стеке, значение 42
int *p = &x;       // оператор & — «взять адрес». p хранит адрес x
*p = 10;           // оператор * — разыменование. Запись 10 по адресу p
p++;               // арифметика указателей: сдвиг на sizeof(int)=4 байта</pre>
<p>Указатель — это переменная, хранящая адрес другой переменной. На 64-битной системе указатель занимает 8 байт.</p></div>
<div class="lesson-card"><h3>Арифметика указателей</h3><p>Если <code>p</code> — указатель типа <code>T*</code>, то <code>p + n</code> сдвигает адрес на <code>n * sizeof(T)</code> байт. Примеры:</p><ul><li><code>int *p; p++</code> → +4 байта.</li><li><code>char *p; p++</code> → +1 байт.</li><li><code>double *p; p++</code> → +8 байт.</li></ul></div>
<div class="warning-block"><h4>Правила безопасности указателей</h4><ol><li>Всегда инициализируйте указатели (или присваивайте NULL).</li><li>Проверяйте на NULL перед разыменованием.</li><li>Не возвращайте указатель на локальную переменную (после выхода из функции память освобождается).</li><li>После free() обнуляйте указатель (предотвращение use-after-free).</li><li>Не выходите за границы выделенной памяти.</li></ol></div>`, ["Kernighan B., Ritchie D. «The C Programming Language»","Prata S. «C Primer Plus»","Bryant R., O'Hallaron D. «CS:APP», Глава 3"])));

    S2.push(L("2.3", "Переполнение буфера в стеке", "cs", makeContent(2, 3, "Переполнение буфера в стеке", `
<div class="theory-block"><h3>Классическая уязвимость</h3><p>Stack Buffer Overflow — исторически первая широко используемая уязвимость (Morris Worm, 1988). Программа выделяет на стеке буфер фиксированного размера. Злоумышленник подаёт данные большего размера, чем буфер. Избыточные байты последовательно затирают: соседние локальные переменные → сохранённый RBP → адрес возврата. Когда функция выполняет RET, управление передаётся по адресу, указанному злоумышленником — обычно это адрес шелл-кода.</p></div>
<div class="lesson-card"><h3>Схема стека до и после атаки</h3><pre data-lang="До переполнения">
[ buf (8 байт) ][ RBP (8 байт) ][ RET (8 байт) ]
[ A A A A A A A A ][ 0x7fffffffe100 ][ 0x40123456 ]</pre><pre data-lang="После переполнения">
[ A A A A A A A A ][ B B B B B B B B ][ 0x7fffffffe200 ]
    буфер               затёрт RBP         новый адрес → шелл-код</pre></div>
<div class="warning-block"><h4>Современные защиты</h4><ul><li><b>Stack Canary:</b> случайное значение между буфером и RET. Проверяется перед возвратом.</li><li><b>NX-бит (DEP):</b> стек и куча помечены как неисполняемые. Шелл-код на стеке не выполнится.</li><li><b>ASLR:</b> случайные адреса загрузки библиотек, стека и кучи при каждом запуске.</li><li><b>PIE:</b> позиционно-независимый исполняемый файл.</li><li><b>Full RELRO:</b> GOT-таблица недоступна для записи.</li></ul></div>`, ["Erickson J. «Hacking: The Art of Exploitation»","Anley C. et al. «The Shellcoder's Handbook»","Bryant R., O'Hallaron D. «CS:APP», Глава 5"])));

    S2.push(L("2.4", "Ассемблер x86-64: регистры", "cs", makeContent(2, 4, "Ассемблер x86-64: регистры и их назначение", `
<div class="lesson-card"><h3>Регистры общего назначения x86-64</h3><table><tr><th>64-бит</th><th>32-бит</th><th>16-бит</th><th>8-бит</th><th>Назначение</th></tr><tr><td>RAX</td><td>EAX</td><td>AX</td><td>AL</td><td>Аккумулятор, возвращаемое значение функции</td></tr><tr><td>RBX</td><td>EBX</td><td>BX</td><td>BL</td><td>База, сохраняемый регистр</td></tr><tr><td>RCX</td><td>ECX</td><td>CX</td><td>CL</td><td>Счётчик циклов, 4-й аргумент в System V</td></tr><tr><td>RDX</td><td>EDX</td><td>DX</td><td>DL</td><td>Данные, 3-й аргумент, остаток деления</td></tr><tr><td>RSI</td><td>ESI</td><td>SI</td><td>SIL</td><td>Индекс источника, 2-й аргумент</td></tr><tr><td>RDI</td><td>EDI</td><td>DI</td><td>DIL</td><td>Индекс приёмника, 1-й аргумент</td></tr><tr><td>RSP</td><td>ESP</td><td>SP</td><td>SPL</td><td>Указатель вершины стека</td></tr><tr><td>RBP</td><td>EBP</td><td>BP</td><td>BPL</td><td>Указатель базы кадра стека</td></tr><tr><td>RIP</td><td>EIP</td><td>IP</td><td>—</td><td>Указатель текущей инструкции</td></tr></table></div>`, ["Gustafson D. «Assembly Language for x86 Processors»","Intel® 64 and IA-32 Architectures Software Developer's Manual"])));

// ####################################################################
// #####                    ЧАСТЬ 2: ЯДРО ПРИЛОЖЕНИЯ              #####
// ####################################################################

let DB = LESSON_DATABASE;
let currentSemesterId = null;
let currentLessonId = null;
let totalLessons = 0;
let allFlatLessons = [];

function countLessons() {
    totalLessons = 0;
    allFlatLessons = [];
    if (!DB || !DB.semesters) {
        console.warn('База данных не загружена');
        return;
    }
    DB.semesters.forEach(s => {
        if (!s.lessons) return;
        totalLessons += s.lessons.length;
        s.lessons.forEach(l => allFlatLessons.push({ sId: s.id, lId: l.id }));
    });
    const counter = document.getElementById('lesson-counter');
    if (counter) counter.textContent = `Загружено уроков: ${totalLessons}`;
}

function buildTree(filter = '') {
    const container = document.getElementById('tree-container');
    if (!container || !DB || !DB.semesters) return;
    container.innerHTML = '';
    const lowerFilter = filter.toLowerCase();

    DB.semesters.forEach(semester => {
        if (!semester.lessons) return;
        const filteredLessons = semester.lessons.filter(
            l => l.title.toLowerCase().includes(lowerFilter) ||
                 l.id.includes(lowerFilter) ||
                 semester.title.toLowerCase().includes(lowerFilter)
        );
        if (filteredLessons.length === 0 && filter !== '') return;

        const group = document.createElement('div');
        group.className = 'semester-group';

        const header = document.createElement('div');
        header.className = 'semester-header';
        const isOpen = currentSemesterId === semester.id || filter !== '';
        header.innerHTML = `<span><i class="fas fa-folder${isOpen ? '-open' : ''}"></i> ${semester.title}</span><span class="badge">${filteredLessons.length}</span>`;
        header.onclick = () => toggleSemester(semester.id);

        const list = document.createElement('div');
        list.className = `lesson-list${isOpen ? ' open' : ''}`;
        list.id = `semester-${semester.id}`;

        filteredLessons.forEach(lesson => {
            const link = document.createElement('a');
            link.className = `lesson-link${currentLessonId === lesson.id && currentSemesterId === semester.id ? ' active' : ''}`;
            link.textContent = `${lesson.id}: ${lesson.title}`;
            link.onclick = (e) => {
                e.preventDefault();
                loadLesson(semester.id, lesson.id);
                closeMobileSidebar();
            };
            list.appendChild(link);
        });

        group.appendChild(header);
        group.appendChild(list);
        container.appendChild(group);
    });
}

function toggleSemester(id) {
    const list = document.getElementById(`semester-${id}`);
    if (!list) return;
    const isOpen = list.classList.contains('open');
    document.querySelectorAll('.lesson-list').forEach(l => l.classList.remove('open'));
    if (!isOpen) {
        list.classList.add('open');
        currentSemesterId = id;
    } else {
        currentSemesterId = null;
    }
    buildTree(document.getElementById('search-box')?.value || '');
}

function filterLessons() {
    const query = document.getElementById('search-box')?.value || '';
    buildTree(query);
    if (query) {
        document.querySelectorAll('.lesson-list').forEach(l => l.classList.add('open'));
    }
}

function renderResourceBanks(semester) {
    let html = '';
    if (semester.literature && semester.literature.length > 0) {
        html += `<div class="resource-bank"><h3><i class="fas fa-book"></i> Банк литературы: ${semester.title}</h3><ul class="ref-list">`;
        semester.literature.forEach(l => html += `<li>${l}</li>`);
        html += `</ul></div>`;
    }
    if (semester.links && semester.links.length > 0) {
        html += `<div class="resource-bank"><h3><i class="fas fa-link"></i> Полезные ссылки: ${semester.title}</h3><ul class="ref-list">`;
        semester.links.forEach(l => html += `<li><a href="${l.u}" target="_blank" rel="noopener noreferrer">${l.t}</a></li>`);
        html += `</ul></div>`;
    }
    return html;
}

function loadLesson(semesterId, lessonId) {
    if (!DB || !DB.semesters) return;
    const semester = DB.semesters.find(s => s.id === semesterId);
    if (!semester || !semester.lessons) return;
    const lesson = semester.lessons.find(l => l.id === lessonId);
    if (!lesson) return;

    currentSemesterId = semesterId;
    currentLessonId = lessonId;

    const render = document.getElementById('lesson-render');
    if (!render) return;

    render.innerHTML = lesson.content + renderResourceBanks(semester);

    const currentIndex = allFlatLessons.findIndex(l => l.sId === semesterId && l.lId === lessonId);

    const navDiv = document.createElement('div');
    navDiv.className = 'nav-buttons';

    const prevBtn = document.createElement('button');
    prevBtn.className = 'nav-btn';
    prevBtn.innerHTML = '← Предыдущий';
    prevBtn.disabled = currentIndex <= 0;
    if (currentIndex > 0) {
        prevBtn.onclick = () => loadLesson(allFlatLessons[currentIndex - 1].sId, allFlatLessons[currentIndex - 1].lId);
    }
    navDiv.appendChild(prevBtn);

    const info = document.createElement('span');
    info.className = 'nav-info';
    info.textContent = `Урок ${currentIndex + 1} из ${totalLessons}`;
    navDiv.appendChild(info);

    const nextBtn = document.createElement('button');
    nextBtn.className = 'nav-btn';
    nextBtn.innerHTML = 'Следующий →';
    nextBtn.disabled = currentIndex >= totalLessons - 1;
    if (currentIndex < totalLessons - 1) {
        nextBtn.onclick = () => loadLesson(allFlatLessons[currentIndex + 1].sId, allFlatLessons[currentIndex + 1].lId);
    }
    navDiv.appendChild(nextBtn);
    render.appendChild(navDiv);

    const pf = document.getElementById('global-progress');
    if (pf) pf.style.width = ((currentIndex + 1) / totalLessons * 100) + '%';

    buildTree(document.getElementById('search-box')?.value || '');
    document.getElementById('content').scrollTop = 0;

    setTimeout(() => {
        const al = document.querySelector('.lesson-link.active');
        if (al) al.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
}

function toggleMobileSidebar() {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sidebar-overlay');
    if (!sb || !ov) return;
    sb.classList.toggle('open');
    ov.classList.toggle('active');
}

function closeMobileSidebar() {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sidebar-overlay');
    if (!sb || !ov) return;
    sb.classList.remove('open');
    ov.classList.remove('active');
}

document.addEventListener('DOMContentLoaded', () => {
    DB = typeof LESSON_DATABASE !== 'undefined' ? LESSON_DATABASE : { semesters: [] };
    countLessons();
    buildTree();
    if (allFlatLessons.length > 0) {
        loadLesson(allFlatLessons[0].sId, allFlatLessons[0].lId);
    }
});

document.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'Escape') {
        closeMobileSidebar();
        return;
    }
    const ci = allFlatLessons.findIndex(l => l.sId === currentSemesterId && l.lId === currentLessonId);
    if (e.key === 'ArrowRight' && ci < totalLessons - 1) {
        e.preventDefault();
        loadLesson(allFlatLessons[ci + 1].sId, allFlatLessons[ci + 1].lId);
    } else if (e.key === 'ArrowLeft' && ci > 0) {
        e.preventDefault();
        loadLesson(allFlatLessons[ci - 1].sId, allFlatLessons[ci - 1].lId);
    }
});
</script>
